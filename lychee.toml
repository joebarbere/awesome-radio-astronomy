# Configuration for the lychee link checker (https://github.com/lycheeverse/lychee)
# Used by the "Link check" GitHub Action and by local runs (`lychee README.md`).

# Retry transient failures before giving up.
max_retries = 3
retry_wait_time = 2
timeout = 30

# Look like a browser — several archives reject the default user agent.
user_agent = "Mozilla/5.0 (compatible; lychee link checker)"

# Treat these HTTP statuses as success. 429 = rate-limited (the link exists);
# the redirects cover archives that bounce to a login/landing page.
accept = ["200..=204", "206", "301", "302", "307", "308", "429"]

# Don't fail CI on e-mail links.
exclude_mail = true

# Hosts that are valid in a browser but block or throttle automated checkers.
# Add sparingly, with a reason — an exclude hides genuine rot too.
exclude = [
  # Plain-HTTP VLBI archive; blocks non-interactive clients.
  '^http://astrogeo\.org',
  # e-Callisto data tree — slow directory listing, frequently times out in CI.
  '^http://soleil\.i4ds\.ch',
  # JS-rendered SPA; the crawler can't see the real content.
  '^https://www\.herta-experiment\.org',
]
